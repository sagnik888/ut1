[pytest]
addopts = -m "not integration" --import-mode=importlib
pythonpath = .
markers =
    integration: tests that call live broker/data APIs or run slow historical backtests
python_files =
    test_*.py
    scratch_test.py
norecursedirs =
    .benchmarks
    .pytest_cache
    .zenflow
    archive
    data_store
    logs
    restore_point_*
    scratch
    venv
